  "/community/get-community-payment-info/{community-id}":
    get:
      summary: Get Community Payment Info
      operationId: getCommunityPaymentInfo
      tags:
        - Community
      parameters:
        - $ref: "#/components/parameters/community-id"
      responses:
        "200":
          description: Expected response to a valid request
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityPaymentInfo"
        default:
          $ref: "#/components/responses/UnexpectedError"
  /community/add-community-payment-info:
    post:
      summary: Add the payment info for a community
      operationId: addCommunityPaymentInfo
      tags:
        - Community
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: CommunityPaymentInfo
              type: object
              required:
                - communityId
              properties:
                id:
                  type: string
                  format: uuid
                  description: The unique identifier for the funding destination.
                communityId:
                  type: string
                  format: uuid
                  description: The unique identifier for the community.
                cryptoWallets:
                  type: array
                  items:
                    title: CryptoWallets
                    type: object
                    required:
                      - walletAddress
                      - cryptoCurrency
                    properties:
                      walletAddress:
                        type: string
                        description: The cryptocurrency wallet address.
                        example: "0x1234567890abcdef1234567890abcdef12345678"
                      walletAddress2:
                        type: string
                        description: The second cryptocurrency wallet address.
                        example: "0xabcdef1234567890abcdef1234567890abcdef12"
                      cryptoCurrency:
                        type: string
                        description: The type of cryptocurrency.
                        enum:
                          - BITCOIN
                          - ETHEREUM
                          - SOLANA
                          - BASE
                      note:
                        type: string
                        description: A note or comment about the wallet.
                  description: The list of cryptocurrency wallets for the community.
                bankAccounts:
                  type: array
                  items:
                    title: BankAccount
                    type: object
                    required:
                      - accountNumber
                      - routingNumber
                      - accountType
                      - bankName
                      - accountHolderName
                      - currency
                    properties:
                      accountNumber:
                        type: string
                        description: The bank account number.
                        example: "123456789"
                      routingNumber:
                        type: string
                        description: The bank routing number.
                        example: "021000021"
                      accountType:
                        type: string
                        description: The type of bank account.
                        enum:
                          - CHECKING
                          - SAVINGS
                      bankName:
                        type: string
                        description: The name of the bank.
                        example: Bank of America
                      accountHolderName:
                        type: string
                        description: The name of the account holder.
                        example: John Doe
                      currency:
                        type: string
                        description: The currency of the bank account.
                        example: USD
                  description: The list of bank accounts for the community.
      responses:
        "201":
          description: Expected response to a valid request
          content:
            application/json:
              schema:
                type: string
                example: Notification created successfully
        default:
          $ref: "#/components/responses/UnexpectedError"
