  /score/give-points/:
    put:
      summary: Update a score
      operationId: givePoints
      tags:
        - Score
      requestBody:
        description: Add a new notification that user is tagged
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PointsGift"
      responses:
        "201":
          description: Expected response to a valid request
          content:
            application/json:
              schema:
                type: string
