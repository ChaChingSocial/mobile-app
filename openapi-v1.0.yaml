      responses:
        "200":
          description: Expected response to a valid request
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  example: tag1
        default:
          $ref: "#/components/responses/UnexpectedError"
  "/community/status-update/{community-id}":
    get:
      summary: Update the status of a community
      operationId: communityStatusUpdate
      tags:
        - Community
      parameters:
        - $ref: "#/components/parameters/community-id"
        - name: status
          in: query
          required: true
          schema:
            type: string
            enum:
              - LIVE
              - PAUSED
              - PRE_LAUNCH
              - DELETED
      responses:
        "200":
          description: Expected response to a valid request
          content:
            application/json:
              schema:
                type: boolean
        default:
          $ref: "#/components/responses/UnexpectedError"
  "/community/{user-id}":
    get:
      summary: Get a community by user id
      operationId: communityByUserId
      tags:
        - Community
      parameters:
