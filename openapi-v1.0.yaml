components:
  parameters:
    ticket-id:
      name: ticket-id
      in: path
      required: true
      description: ticket id to filter by
      schema:
        type: string
        example: 123e4567-e89b-12d3-a456-426614174000
    slug-name:
      name: slug-name
      in: path
      required: true
      description: slug to filter by
      schema:
        type: string
        example: defi
    post-id:
      name: post-id
      in: path
      required: true
      description: post id to filter by
      schema:
        type: string
        example: 123e4567-e89b-12d3-a456-426614174000
    event-slot-id:
      name: event-slot-id
      in: path
      required: true
      description: event slot id to filter by
      schema:
        type: string
        example: 123e4567-e89b-12d3-a456-426614174000
    score:
      name: score
      in: path
      required: true
      schema:
        type: integer
        example: 10
    transaction-id:
      name: transaction-id
      in: path
      required: true
      description: transaction id to filter by
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    vote:
      name: vote
      in: path
      required: true
      description: Voting status
      schema:
        type: string
        enum:
          - YES
          - NO
    poll-id:
      name: poll-id
      in: path
      required: true
      description: poll id to filter by
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    event-id:
      name: event-id
      in: path
      required: true
      description: event id to filter by
      schema:
        type: string
        example: 123e4567-e89b-12d3-a456-426614174000
    community-id:
      name: community-id
      in: path
      required: true
      description: community id to filter by
      schema:
        type: string
        example: 123e4567-e89b-12d3-a456-426614174000
    username:
      name: username
      in: path
      required: true
      description: username to filter by
      schema:
        type: string
        example: mindegg
    comment-id:
      name: comment-id
      in: path
      required: true
      description: comment id to filter by
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    actions:
      name: actions
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Actions"
    badge-id:
      name: badge-id
      in: path
      required: true
      description: badge to filter by
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    user-id:
      name: user-id
      in: path
      required: true
      description: userId to filter by
      schema:
        type: string
        example: 123e4567-e89b-12d3-a456-426614174000
    dateEnd:
      name: dateEnd
      in: query
      required: false
      schema:
        type: string
        format: date-time
        example: 2017-07-21T17:32:28Z
    partnerId:
      name: partnerId
      in: query
      description: partner to filter by
      required: false
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    dateStart:
      name: dateStart
      in: query
      required: false
      schema:
        type: string
        format: date-time
        example: 2017-07-21T17:32:28Z
    transactionType:
      name: transactionType
      in: query
      required: false
      description: Transaction Type
      schema:
        $ref: "#/components/schemas/TransactionType"
    badgeId:
      name: badgeId
      in: query
      description: badge to filter by
      required: false
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    offerId:
      name: resourceId
      in: query
      description: resource to filter by
      required: false
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    bookmarked:
      name: bookmarked
      in: query
      schema:
        type: boolean
        default: false
        description: Filter by bookmarked
