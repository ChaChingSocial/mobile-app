      name: resourceStatus
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/Status"
    communityId:
      name: communityId
      in: query
      description: comment id to query by
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    question:
      name: question
      in: query
      description: question to filter by
      required: false
      schema:
        type: string
    pollId:
      name: pollId
      in: query
      description: poll to filter by
      required: false
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    offerType:
      name: offerType
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/Category"
    title:
      name: title
      in: query
      description: title to filter by
      required: false
      schema:
        type: string
    offerStatus:
      name: offerStatus
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/Status"
    limit:
      name: limit
      in: query
      description: How many items to return at one time (max 100)
      required: false
      schema:
        type: integer
        format: int32
    userId:
      name: userId
      in: query
      description: userId to filter by
      required: false
      schema:
        type: string
        example: 123e4567-e89b-12d3-a456-426614174000
    emails:
      name: emails
      in: query
      required: true
      schema:
        type: array
        items:
          type: string
        example:
          - user1@example.com
          - user2@example.com
      style: form
      explode: true
      description: A list of email addresses
    postId:
      name: postId
      in: query
      description: postId to filter by
      required: false
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    phone:
      name: phone
      in: query
      description: phone to filter by
      required: false
      schema:
        type: string
        example: "18234567890"
    email:
      name: email
      in: query
      description: email to filter by
      required: false
      schema:
        type: string
        example: patshala.smith@gmail.com
    tags:
      name: tags
      in: query
      description: Tags to filter products by
      required: false
      schema:
        type: array
        items:
          type: string
        example:
          - electronics
          - kitchen
          - outdoors
    transactionId:
      name: transactionId
      in: query
      description: transaction id to filter by
      required: false
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
  schemas:
    Offer:
      title: Offer
      type: object
      required:
        - title
        - description
        - offerLink
        - offerStatus
        - offerType
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier for the offer.
        title:
          type: string
          description: The title of the offer.
        description:
          type: string
          description: The description of the offer.
        offerLink:
          type: string
          description: The link to the offer.
        offerStatus:
          $ref: "#/components/schemas/Status"
          description: The status of the offer.
        offerType:
          $ref: "#/components/schemas/Category"
          description: The type of the offer.
    TransactionType:
      title: TransactionType
      type: string
      description: Transaction type tells us if it's an incoming or outgoing transaction
      enum:
        - EXPENSE
        - INCOME
    Transaction:
      title: Transaction
      type: object
      required:
        - amount
        - date
        - description
        - transactionCategory
        - transactionType
        - userId
      properties:
        id:
          type: string
          format: uuid
          example: d290f1ee-6c54-4b01-90e6-d701748f0851
        amount:
          type: number
          example: 100
        date:
