              schema:
                type: array
                items:
                  title: User
                  type: object
                  required:
                    - username
                    - id
                    - profilePic
                  properties:
                    id:
                      type: string
                      example: 123e4567-e89b-12d3-a456-426614174000
                    username:
                      type: string
                      example: Johnny
                    profilePic:
                      type: string
                      example: https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png
        default:
          $ref: "#/components/responses/UnexpectedError"
  "/community/community-rules/{community-id}":
    get:
      summary: Get community rules
      operationId: communityRules
