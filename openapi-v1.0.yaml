          $ref: "#/components/responses/UnexpectedError"
components:
  parameters:
    slug-name:
      name: slug-name
      in: path
      required: true
      description: slug to filter by
      schema:
        type: string
        example: defi
    post-id:
      name: post-id
      in: path
      required: true
      description: post id to filter by
      schema:
        type: string
        example: 123e4567-e89b-12d3-a456-426614174000
    score:
      name: score
      in: path
      required: true
      schema:
        type: integer
        example: 10
    transaction-id:
      name: transaction-id
      in: path
      required: true
      description: transaction id to filter by
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    vote:
      name: vote
      in: path
      required: true
      description: Voting status
      schema:
        type: string
        enum:
          - YES
          - NO
    poll-id:
      name: poll-id
      in: path
      required: true
      description: poll id to filter by
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    community-id:
      name: community-id
      in: path
      required: true
      description: community id to filter by
      schema:
        type: string
        example: 123e4567-e89b-12d3-a456-426614174000
    username:
      name: username
      in: path
      required: true
      description: username to filter by
      schema:
        type: string
        example: mindegg
    comment-id:
      name: comment-id
      in: path
      required: true
      description: comment id to filter by
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    actions:
      name: actions
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Actions"
    badge-id:
      name: badge-id
      in: path
      required: true
      description: badge to filter by
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    user-id:
      name: user-id
      in: path
      required: true
      description: userId to filter by
      schema:
        type: string
        example: 123e4567-e89b-12d3-a456-426614174000
    dateEnd:
      name: dateEnd
      in: query
      required: false
      schema:
        type: string
        format: date-time
        example: 2017-07-21T17:32:28Z
    partnerId:
      name: partnerId
      in: query
      description: partner to filter by
      required: false
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    dateStart:
      name: dateStart
      in: query
      required: false
      schema:
        type: string
        format: date-time
        example: 2017-07-21T17:32:28Z
    transactionType:
      name: transactionType
      in: query
      required: false
      description: Transaction Type
      schema:
        $ref: "#/components/schemas/TransactionType"
    badgeId:
      name: badgeId
      in: query
      description: badge to filter by
      required: false
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    offerId:
      name: resourceId
      in: query
      description: resource to filter by
      required: false
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    bookmarked:
      name: bookmarked
      in: query
      schema:
        type: boolean
        default: false
        description: Filter by bookmarked
    resourceStatus:
      name: resourceStatus
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/Status"
    communityId:
      name: communityId
      in: query
      description: comment id to query by
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    question:
      name: question
      in: query
      description: question to filter by
      required: false
      schema:
        type: string
    pollId:
      name: pollId
      in: query
      description: poll to filter by
      required: false
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    offerType:
      name: offerType
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/Category"
    title:
      name: title
      in: query
      description: title to filter by
      required: false
      schema:
        type: string
    offerStatus:
      name: offerStatus
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/Status"
    limit:
      name: limit
      in: query
      description: How many items to return at one time (max 100)
      required: false
      schema:
        type: integer
        format: int32
    userId:
      name: userId
      in: query
      description: userId to filter by
      required: false
      schema:
        type: string
        example: 123e4567-e89b-12d3-a456-426614174000
    emails:
      name: emails
      in: query
      required: true
      schema:
        type: array
        items:
          type: string
        example:
          - user1@example.com
          - user2@example.com
      style: form
      explode: true
      description: A list of email addresses
    postId:
      name: postId
      in: query
      description: postId to filter by
      required: false
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    phone:
      name: phone
      in: query
      description: phone to filter by
      required: false
      schema:
        type: string
        example: "18234567890"
    email:
      name: email
      in: query
      description: email to filter by
      required: false
      schema:
        type: string
        example: patshala.smith@gmail.com
    tags:
      name: tags
      in: query
      description: Tags to filter products by
      required: false
      schema:
        type: array
        items:
          type: string
        example:
          - electronics
          - kitchen
          - outdoors
    transactionId:
      name: transactionId
      in: query
      description: transaction id to filter by
      required: false
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
  schemas:
    Offer:
      title: Offer
      type: object
      required:
        - title
        - description
        - offerLink
        - offerStatus
        - offerType
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier for the offer.
        title:
          type: string
          description: The title of the offer.
        description:
          type: string
          description: The description of the offer.
        offerLink:
          type: string
          description: The link to the offer.
        offerStatus:
          $ref: "#/components/schemas/Status"
          description: The status of the offer.
        offerType:
          $ref: "#/components/schemas/Category"
          description: The type of the offer.
    TransactionType:
      title: TransactionType
      type: string
      description: Transaction type tells us if it's an incoming or outgoing transaction
      enum:
        - EXPENSE
        - INCOME
    Transaction:
      title: Transaction
      type: object
      required:
        - amount
        - date
        - description
        - transactionCategory
        - transactionType
        - userId
      properties:
        id:
          type: string
          format: uuid
          example: d290f1ee-6c54-4b01-90e6-d701748f0851
        amount:
          type: number
          example: 100
        date:
          type: string
          format: date-time
          example: 2017-07-21T17:32:28Z
        description:
          type: string
          example: Payment for groceries
        transactionCategory:
          type: string
          example: Groceries
        transactionType:
          $ref: "#/components/schemas/TransactionType"
        userId:
          type: string
          format: uuid
          example: d290f1ee-6c54-4b01-90e6-d701748f0851
        reoccurring:
          type: boolean
          example: false
    Notification:
      title: Notification
      type: object
      required:
        - notificationType
        - entityType
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier for the offer.
        userId:
          type: string
          format: uuid
          description: The unique identifier for the user.
        emails:
          type: array
          items:
            type: string
          example:
            - something@gmail.com
            - othersomething@gmail.com
        communityId:
          type: string
          format: uuid
          description: The unique identifier for the community.
        notificationType:
          type: string
          enum:
            - OINKED
            - TAGGED
            - INVITED
            - ACCEPTED
            - REJECTED
            - COMMENTED
            - LIKED
            - COMMENT_LIKED
            - FOLLOWED
            - SUBSCRIBED
            - EVENT_REMINDER
            - EVENT_CANCELLED
            - EVENT_RESCHEDULED
            - EVENT_STARTED
            - EVENT_INVITE
            - COMMUNITY_UPDATE
            - COMMUNITY_INVITE
            - PRODUCT_SHIPPED
            - PRODUCT_DELIVERED
            - PRODUCT_RETURNED
            - PRODUCT_PURCHASED
            - PRODUCT_PURCHASED
          example: COMMENTED
          description: The type of the notification.
        notificationImage:
          type: string
          description: The image of the notification.
          example: https://nas-national-prod.s3.amazonaws.com/h_a1_4285_1_wild-turkey_october_greenfield_k
        notificationTitle:
          type: string
          description: The name of the notification.
          example: Blockchain
        notificationLink:
          type: string
          description: The link of the notification.
          example: http://www.blockchainconference.com
        notificationMessage:
          type: string
          description: The message of the notification.
          example: You have a new comment on your post.
        entityType:
          type: string
          enum:
            - POST
            - COMMENT
            - EVENT
            - PRODUCT
            - COMMUNITY
          description: The type of entity related to the notification.
        createdAt:
          type: string
          description: The timestamp when the notification was created.
        expiryDate:
          type: string
          description: The timestamp when the notification expires.
        emailSent:
          type: boolean
          description: Indicates whether the email has been sent.
          example: true
        read:
          type: boolean
          description: Indicates whether the notification has been read.
          example: false
    Resource:
      title: Resource
      type: object
      required:
        - title
        - description
        - resourceLink
        - resourceStatus
        - resourceType
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier for the resource.
        title:
          type: string
          description: The title of the resource.
        description:
          type: string
          description: The description of the resource.
        resourceLink:
          type: string
          description: The link to the resource.
        resourceStatus:
          $ref: "#/components/schemas/Status"
          description: The status of the resource.
        resourceType:
          $ref: "#/components/schemas/Category"
          description: The type of the resource.
    Subscription:
      title: Subscription
      type: object
      required:
        - userId
        - subscriptionPrice
      properties:
        userId:
          type: string
          description: The unique identifier for the user.
        subscriptionPrice:
          type: double
          example: 10
        lastPaymentDate:
          $ref: "#/components/schemas/Date"
        nextPaymentDate:
          $ref: "#/components/schemas/Date"
        subscribers:
          type: array
          items:
            $ref: "#/components/schemas/Subscriber"
        address:
          $ref: "#/components/schemas/Address"
        status:
          $ref: "#/components/schemas/Status"
        createdAt:
          $ref: "#/components/schemas/Date"
        modifiedAt:
          $ref: "#/components/schemas/Date"
    UserInfo:
      title: User
      type: object
      required:
        - username
        - id
        - profilePic
      properties:
        id:
          type: string
          example: 123e4567-e89b-12d3-a456-426614174000
        username:
          type: string
          example: Johnny
        profilePic:
          type: string
          example: https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png
    Social:
      title: Social
      type: object
      properties:
        userId:
          type: string
          description: The unique identifier for the user.
        facebook:
          type: string
          description: The Facebook profile URL of the user.
        twitter:
          type: string
          description: The Twitter profile URL of the user.
        instagram:
          type: string
          description: The Instagram profile URL of the user.
        linkedin:
          type: string
          description: The LinkedIn profile URL of the user.
        tiktok:
          type: string
          description: The TikTok profile URL of the user.
        youtube:
          type: string
          description: The YouTube channel URL of the user.
        twitch:
          type: string
          description: The Twitch profile URL of the user.
        snapchat:
          type: string
          description: The Snapchat profile URL of the user.
        discord:
          type: string
          description: The Discord profile URL of the user.
        medium:
          type: string
          description: The Medium profile URL of the user.
        website:
          type: string
          description: The primary website URL of the user.
        website2:
          type: string
          description: The secondary website URL of the user.
        website3:
          type: string
          description: The tertiary website URL of the user.
    UserContact:
      title: User
      type: object
      required:
        - username
        - email
      properties:
        id:
          type: string
          example: 123e4567-e89b-12d3-a456-426614174000
        email:
          $ref: "#/components/schemas/Email"
        phone:
          $ref: "#/components/schemas/Phone"
        username:
          type: string
          example: Johnny
    User:
      title: User
      type: object
      required:
        - username
      properties:
        id:
          type: string
          example: 123e4567-e89b-12d3-a456-426614174000
        username:
          type: string
          example: Johnny
        email:
          type: string
          format: email
        profilePic:
          type: string
          example: https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png
        backgroundPic:
          type: string
          example: https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png
        bio:
          type: string
          example: I am a software engineer
        interests:
          type: array
          items:
            type: string
          example:
            - Blockchain
            - Cryptocurrency
        finfluencer:
          type: boolean
          example: false
        moneyPersonality:
          type: string
          example: SAVER
        industry:
          type: string
          example: Education
        city:
          type: string
          example: San Francisco
        socials:
          $ref: "#/components/schemas/Social"
        timezone:
          $ref: "#/components/schemas/Timezone"
        address:
          $ref: "#/components/schemas/Address"
        status:
          $ref: "#/components/schemas/Status"
        createdAt:
          $ref: "#/components/schemas/Date"
        modifiedAt:
          $ref: "#/components/schemas/Date"
        subscribePrice:
          type: number
          example: 0.99
    Subscriber:
      title: Subscriber
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          example: 123e4567-e89b-12d3-a456-426614174000
        subscriptionPrice:
          type: double
          example: 10
        dateSubscribed:
          $ref: "#/components/schemas/Date"
        lastPaymentDate:
          $ref: "#/components/schemas/Date"
        nextPaymentDate:
          $ref: "#/components/schemas/Date"
        cancelledAt:
          $ref: "#/components/schemas/Date"
    Blog:
      title: Blog
      type: object
      required:
        - title
        - content
        - communityId
        - slug
        - authorId
      properties:
        title:
          type: string
          description: The title of the blog.
          example: Blockchain
        subtitle:
          type: string
          description: The subtitle of the blog.
          example: Understanding the Basics of Blockchain
        content:
          type: string
          description: The content of the blog.
          example: Blockchain is a system in which a record of transactions made in
            bitcoin or another cryptocurrency are maintained across several
            computers that are linked in a peer-to-peer network.
        communityId:
          type: string
          format: uuid
          description: The unique identifier for the community.
        slug:
          type: string
          description: The slug of the blog.
          example: blockchain
        authorId:
          type: string
          format: uuid
          description: The unique identifier for the author.
        coverPhoto:
          type: string
          description: The image of the blog.
          example: https://nas-national-prod.s3.amazonaws.com/h_a1_4285_1_wild-turkey_october_greenfield_k
        tags:
          type: array
          items:
            type: string
          description: The tags of the blog.
          example:
            - Blockchain
            - Cryptocurrency
        draft:
          type: boolean
          description: The draft status of the blog.
          example: false
        createdAt:
          type: string
          description: The date and time when the blog was published.
          example: 2021-10-01T00:00:00Z
        modifiedAt:
          type: string
          format: date-time
          description: The date and time when the blog was last updated.
          example: 2021-10-01T00:00:00Z
        postId:
          type: string
          format: uuid
          description: The unique identifier for the post.
        authorProfilePic:
          type: string
          description: The profile picture of the author.
          example: https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png
        ipfsHash:
          type: string
          description: The IPFS hash of the blog.
          example: QmTzQ1iW4g9z8Z2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z
    Error:
      title: Error
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
    Date:
      type: object
      title: Date
      description: >
        An object describing the date with the date and time. 

        For simplicity the time is always in UTC, so no timezone is associated to the time. 

        Time is only converted to the user's timezone when displayed in the frontend.
      properties:
        postedTime:
          type: string
          format: date-time
          example: 2017-07-21T17:32:28Z
    Amount:
      type: object
      title: Amount
      description: An object describing the amount, could be used for prices and balances.
      properties:
        amount:
          type: number
          format: currency
        currency:
          type: string
          enum:
            - USD
            - EUR
    Category:
      title: Category
      type: string
      enum:
        - CREDIT_CARD
        - SAVINGS_ACCOUNT
        - HOME_LOAN
        - PERSONAL_LOAN
        - CAR_LOAN
        - EDUCATION_LOAN
        - INSURANCE
        - CRYPTO
        - STOCKS
        - MUTUAL_FUNDS
        - IRA_ACCOUNT
        - 401K_ACCOUNT
        - RETIREMENT_ACCOUNT
        - MISC
    Address:
      type: object
      title: Address
      description: An object describing an address
      properties:
        address:
          type: string
          example: 123 Blockchain Blvd
        address_2:
          type: string
          example: "1232"
        city:
          type: string
          example: Chicago
        state:
          type: string
          enum:
            - AL
            - AK
            - AZ
            - AR
            - CA
            - CO
            - CT
            - DE
            - FL
            - GA
            - HI
            - ID
            - IL
            - IN
            - IA
            - KS
            - KY
            - LA
            - ME
            - MD
            - MA
            - MI
            - MN
            - MS
            - MO
            - MT
            - NE
            - NV
            - NH
            - NJ
            - NM
            - NY
            - NC
            - ND
            - OH
            - OK
            - OR
            - PA
            - RI
            - SC
            - SD
            - TN
            - TX
            - UT
            - VT
            - VA
            - WA
            - WV
            - WI
            - WY
          example: CA
        zip_code:
          type: string
          example: "94312"
        country:
          type: string
          example: U.S.A.
    PreferredLanguage:
      title: PreferredLanguage
      type: string
      enum:
        - EN
        - ES
        - FR
        - DE
        - HI
        - TE
        - ZH
        - PL
        - AR
    Timezone:
      title: Timezone
      type: string
      enum:
        - PST
        - EST
        - CST
        - GMT
        - MST
    Status:
      title: Status
      type: string
      enum:
        - ACTIVE
        - PAUSED
        - EXPIRED
        - PENDING
    Phone:
      type: object
      title: Phone
      description: An object describing the phone number
      required:
        - phone
        - countryCode
      properties:
        countryCode:
          type: string
          example: "1"
        phoneNumber:
          type: string
          pattern: ^\+?[1-9]\d{1,14}$
          example: "2345678900"
    Email:
