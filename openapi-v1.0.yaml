openapi: 3.0.0
info:
  title: ChaChing Social Social API
  description: FatFIRESocial is a social network for people who are interested in financial
    independence and early retirement. It is a place to share your journey, ask
    questions, and connect with others who are on the same path. Whether you are
    just starting out or have already achieved financial independence,
    FatFIRESocial is a community where you can find support, inspiration, and
    advice. Join us today and start building the life you want! ```
  termsOfService: https://www.chachingsocial.io/terms-of-service
  contact:
    name: ChaChing Social API Support
    url: https://chachingsocial.io
    email: mabel.oza@chachingsocial.io
  license:
    name: Apache-2.0
    url: http://www.apache.org/licenses/LICENSE-2.0
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local Server
  - url: https://chachingsocial-20694693160.us-central1.run.app
    description: DEV Server
  - url: https://chachingsocial-615685871214.us-central1.run.app
    description: PROD Server
tags:
  - name: User
    description: |-
      Auth requests are used to
      handle user authentication.
  - name: Badge
    description: Badge requests are used to handle badge activity.
  - name: Web3
    description: Web3 requests are used to handle web3 activity.
  - name: Financing
    description: All personal finance management operations like monthly transactions,
      metric goals, etc.
  - name: Newsfeed
    description: All newsfeed operations like creating posts, editing posts, etc.
  - name: Resources
    description: Operations for managing financial literacy resources
  - name: Offers
    description: Operations for managing our partner offers.
  - name: Poll
    description: Poll requests are used to handle poll activity.
  - name: Notification
    description: Notification requests are used to handle notification activity.
  - name: Chat
    description: |-
      Chat requests are used to 
      handle chat room activity.
  - name: Event
    description: |-
      Event requests are used to 
      handle event activity.
  - name: Community
    description: |-
      Community requests are used to 
      handle community activity.
  - name: Score
    description: |-
      Score requests are used to 
      handle score activity.
paths:
  "/transaction/transactions/{user-id}":
    get:
      summary: List all the transactions for a user
      operationId: getTransactions
      tags:
        - Financing
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/userId"
        - $ref: "#/components/parameters/transactionId"
        - $ref: "#/components/parameters/transactionType"
        - $ref: "#/components/parameters/dateStart"
        - $ref: "#/components/parameters/dateEnd"
      responses:
        "200":
          description: Expected response to a valid request
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
        default:
          $ref: "#/components/responses/UnexpectedError"
  /blogs/published-blogs:
    get:
      summary: Get all published blogs that fit the query
      operationId: getPublishedBlogs
      tags:
        - Blog
      parameters:
        - name: communityIds
          in: query
          description: List of community IDs
          required: false
          schema:
            type: array
            items:
              type: string
        - name: userIds
          in: query
          description: List of user IDs
          required: false
          schema:
            type: array
            items:
              type: string
        - name: slugNames
          in: query
          description: List of slug names
          required: false
          schema:
            type: array
            items:
              type: string
        - name: tags
          in: query
          description: List of tags
          required: false
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: Expected response to a valid request
          content:
            application/json:
              schema:
                type: array
                items:
                  title: Blog
                  type: object
                  required:
                    - title
                    - content
                    - communityId
                    - slug
                    - authorId
                  properties:
                    title:
                      type: string
                      description: The title of the blog.
                      example: Blockchain
                    subtitle:
                      type: string
                      description: The subtitle of the blog.
                      example: Understanding the Basics of Blockchain
                    content:
                      type: string
                      description: The content of the blog.
                      example: Blockchain is a system in which a record of transactions
                        made in bitcoin or another cryptocurrency are maintained
                        across several computers that are linked in a
                        peer-to-peer network.
                    communityId:
                      type: string
                      format: uuid
                      description: The unique identifier for the community.
                    slug:
                      type: string
                      description: The slug of the blog.
                      example: blockchain
                    authorId:
                      type: string
                      format: uuid
                      description: The unique identifier for the author.
                    coverPhoto:
                      type: string
                      description: The image of the blog.
                      example: https://nas-national-prod.s3.amazonaws.com/h_a1_4285_1_wild-turkey_october_greenfield_k
                    tags:
                      type: array
                      items:
                        type: string
                      description: The tags of the blog.
                      example:
                        - Blockchain
                        - Cryptocurrency
                    draft:
                      type: boolean
                      description: The draft status of the blog.
                      example: false
                    createdAt:
                      type: string
                      description: The date and time when the blog was published.
                      example: 2021-10-01T00:00:00Z
                    modifiedAt:
                      type: string
                      format: date-time
                      description: The date and time when the blog was last updated.
                      example: 2021-10-01T00:00:00Z
                    postId:
                      type: string
                      format: uuid
                      description: The unique identifier for the post.
                    authorProfilePic:
                      type: string
                      description: The profile picture of the author.
                      example: https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png
                    ipfsHash:
                      type: string
                      description: The IPFS hash of the blog.
                      example: QmTzQ1iW4g9z8Z2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z
        default:
          $ref: "#/components/responses/UnexpectedError"
  /blogs/upload-ipfs:
    post:
      summary: Upload Blog to IPFS
      operationId: uploadToIPFS
      tags:
        - Blog
      requestBody:
        description: Adding blog to IPFS and returning a CID
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Blog"
      responses:
        "201":
          description: Expected response to a valid request
          content:
            application/json:
              schema:
                type: string
                example: Notification created successfully
        default:
          $ref: "#/components/responses/UnexpectedError"
