name: EAS Build + Submit (main)

on:
  push:
    branches: ["main"]

concurrency:
  group: eas-main
  cancel-in-progress: true

jobs:
  build_and_submit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm i -g eas-cli

      - name: Verify Expo auth
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas whoami
          eas project:info

      # ---- iOS: build -> capture build ID -> submit that exact build ----
      - name: Build iOS (production)
        id: build_ios
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform ios --profile production --non-interactive --wait --json > ios-build.json
          BUILD_ID=$(jq -r '.[0].id' ios-build.json)
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"

      - name: Submit iOS (App Store Connect)
        continue-on-error: true
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas submit --platform ios --profile production --non-interactive --id ${{ steps.build_ios.outputs.build_id }}

      # ---- Android: build -> capture build ID -> submit that exact build ----
      - name: Build Android (production)
        id: build_android
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform android --profile production --non-interactive --wait --json > android-build.json
          BUILD_ID=$(jq -r '.[0].id' android-build.json)
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"

      - name: Submit Android (Google Play)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas submit --platform android --profile production --non-interactive --id ${{ steps.build_android.outputs.build_id }}
